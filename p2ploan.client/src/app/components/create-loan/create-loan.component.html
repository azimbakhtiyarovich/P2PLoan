<div class="page">
  <a routerLink="/my-loans" class="back-link">&#8592; Orqaga</a>
  <h2>Yangi loan yaratish</h2>

  <div class="alert-success" *ngIf="success">{{ success }}</div>
  <div class="alert-error" *ngIf="error">{{ error }}</div>

  <div class="card">
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nomi (ixtiyoriy)</label>
        <input type="text" [(ngModel)]="form.title" name="title" placeholder="Masalan: Biznes uchun qarz" />
      </div>

      <div class="form-group">
        <label>Tavsif (ixtiyoriy)</label>
        <textarea [(ngModel)]="form.description" name="description"
                  placeholder="Loan maqsadi haqida qisqacha yozing..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Summa (UZS) *</label>
          <input type="number" [(ngModel)]="form.amount" name="amount"
                 placeholder="1 000 000" min="1" required />
        </div>
        <div class="form-group">
          <label>Muddat (kun) *</label>
          <input type="number" [(ngModel)]="form.durationDays" name="durationDays"
                 placeholder="30" min="7" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Yillik foiz (%) *</label>
          <input type="number" [(ngModel)]="form.interestRate" name="interestRate"
                 placeholder="12" min="1" max="100" step="0.1" required />
        </div>
        <div class="form-group">
          <label>To'lov chastotasi</label>
          <select [(ngModel)]="form.frequency" name="frequency">
            <option *ngFor="let f of frequencies" [ngValue]="f.value">{{ f.label }}</option>
          </select>
        </div>
      </div>

      <button type="submit" [disabled]="loading" style="margin-top: 8px;">
        {{ loading ? 'Yaratilmoqda...' : 'Loan yaratish' }}
      </button>
    </form>
  </div>
</div>
