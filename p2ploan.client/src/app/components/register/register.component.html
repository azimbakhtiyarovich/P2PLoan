<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">P2P</span>
    </div>
    <h2>Ro'yxatdan o'tish</h2>
    <p class="auth-subtitle">Yangi hisob yarating va boshlang</p>

    <div class="alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email"
               placeholder="email@example.com" required />
      </div>

      <div class="form-group">
        <label>Telefon raqam</label>
        <input type="text" [(ngModel)]="phoneNumber" name="phoneNumber"
               placeholder="+998 90 123 45 67" required />
      </div>

      <div class="form-group">
        <label>Parol</label>
        <input type="password" [(ngModel)]="password" name="password"
               placeholder="Kamida 8 ta belgi" required />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Yuklanmoqda...' : 'Ro\'yxatdan o\'tish' }}
      </button>
    </form>

    <p>Hisobingiz bormi? <a routerLink="/login">Kirish</a></p>
  </div>
</div>
